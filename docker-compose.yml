services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: recruit-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8800}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - recruit
    depends_on:
      - app

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recruit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-recruit}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1q2w3e4r}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - recruit-postgres-data:/var/lib/postgresql/data
    networks:
      - recruit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-recruit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: recruit-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - recruit-redis-data:/data
    networks:
      - recruit
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-worker
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  # Scheduler (cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      app:
        condition: service_started

  # Mailpit (local email testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: recruit-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_DASHBOARD_PORT:-8026}:8025"
      - "${MAIL_PORT:-1026}:1025"
    networks:
      - recruit

volumes:
  recruit-postgres-data:
    driver: local
  recruit-redis-data:
    driver: local

networks:
  recruit:
    driver: bridge
