services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-app
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: recruit-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8800}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - recruit
    depends_on:
      - app

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recruit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-recruit}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1q2w3e4r}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - recruit-postgres-data:/var/lib/postgresql/data
    networks:
      - recruit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-recruit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: recruit-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - recruit-redis-data:/data
    networks:
      - recruit
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-worker
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  # Scheduler (cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${DOCKER_UID:-1000}
        user: recruit
    container_name: recruit-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - recruit
    depends_on:
      app:
        condition: service_started

  # Mailpit (local email testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: recruit-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_DASHBOARD_PORT:-8026}:8025"
      - "${MAIL_PORT:-1026}:1025"
    networks:
      - recruit

  # Jitsi Meet - Web frontend
  jitsi-web:
    image: jitsi/web:stable-9823
    container_name: recruit-jitsi-web
    restart: unless-stopped
    ports:
      - "${JITSI_WEB_PORT:-8443}:443"
      - "${JITSI_WEB_HTTP_PORT:-8880}:80"
    volumes:
      - recruit-jitsi-web-config:/config
      - recruit-jitsi-web-crontabs:/var/spool/cron/crontabs
      - recruit-jitsi-transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      ENABLE_AUTH: ${JITSI_ENABLE_AUTH:-1}
      ENABLE_GUESTS: ${JITSI_ENABLE_GUESTS:-1}
      AUTH_TYPE: ${JITSI_AUTH_TYPE:-jwt}
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-recruit}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET:-recruit_jitsi_secret_key_change_me}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_ACCEPTED_ISSUERS:-recruit}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_ACCEPTED_AUDIENCES:-recruit}
      PUBLIC_URL: ${JITSI_PUBLIC_URL:-https://localhost:8443}
      TZ: ${TZ:-UTC}
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_BOSH_URL_BASE: http://prosody:5280
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
    networks:
      meet.jitsi:
        aliases:
          - meet.jitsi
      recruit:
    depends_on:
      - prosody

  # Jitsi Meet - XMPP server (Prosody)
  prosody:
    image: jitsi/prosody:stable-9823
    container_name: recruit-jitsi-prosody
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5347"
      - "5280"
    volumes:
      - recruit-jitsi-prosody-config:/config
      - recruit-jitsi-prosody-plugins:/prosody-plugins-custom
    environment:
      ENABLE_AUTH: ${JITSI_ENABLE_AUTH:-1}
      ENABLE_GUESTS: ${JITSI_ENABLE_GUESTS:-1}
      AUTH_TYPE: ${JITSI_AUTH_TYPE:-jwt}
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-recruit}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET:-recruit_jitsi_secret_key_change_me}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_ACCEPTED_ISSUERS:-recruit}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_ACCEPTED_AUDIENCES:-recruit}
      JWT_ALLOW_EMPTY: 0
      TZ: ${TZ:-UTC}
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_CROSS_DOMAIN: "true"
    networks:
      meet.jitsi:
        aliases:
          - xmpp.meet.jitsi

  # Jitsi Meet - Focus component (Jicofo)
  jicofo:
    image: jitsi/jicofo:stable-9823
    container_name: recruit-jitsi-jicofo
    restart: unless-stopped
    volumes:
      - recruit-jitsi-jicofo-config:/config
    environment:
      AUTH_TYPE: ${JITSI_AUTH_TYPE:-jwt}
      SENTRY_DSN: "0"
      TZ: ${TZ:-UTC}
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD:-jicofo_pass_change_me}
    networks:
      meet.jitsi:
    depends_on:
      - prosody

  # Jitsi Meet - Video bridge (JVB)
  jvb:
    image: jitsi/jvb:stable-9823
    container_name: recruit-jitsi-jvb
    restart: unless-stopped
    ports:
      - "${JITSI_JVB_PORT:-10000}:10000/udp"
    volumes:
      - recruit-jitsi-jvb-config:/config
    environment:
      SENTRY_DSN: "0"
      TZ: ${TZ:-UTC}
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD:-jvb_pass_change_me}
      JVB_PORT: 10000
      JVB_STUN_SERVERS: stun.l.google.com:19302,stun1.l.google.com:19302,stun2.l.google.com:19302
    networks:
      meet.jitsi:
    depends_on:
      - prosody

volumes:
  recruit-postgres-data:
    driver: local
  recruit-redis-data:
    driver: local
  recruit-jitsi-web-config:
    driver: local
  recruit-jitsi-web-crontabs:
    driver: local
  recruit-jitsi-transcripts:
    driver: local
  recruit-jitsi-prosody-config:
    driver: local
  recruit-jitsi-prosody-plugins:
    driver: local
  recruit-jitsi-jicofo-config:
    driver: local
  recruit-jitsi-jvb-config:
    driver: local

networks:
  recruit:
    driver: bridge
  meet.jitsi:
    driver: bridge
